{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">{{ action }} Note</h2>

<form method="post" style="
    background: white;
    padding: 30px;
    border-radius: 10px;
    max-width: 520px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
">
    {% csrf_token %}

    {% for field in form %}
    <div style="margin-bottom:18px;">
        <label style="display:block; font-weight:bold; margin-bottom:5px;">
            {{ field.label }}
        </label>
        {{ field }}
        {% if field.errors %}
            <p style="color:red; font-size:13px;">{{ field.errors }}</p>
        {% endif %}
    </div>
    {% endfor %}

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button type="submit" class="btn btn-primary">{{ action }} Note</button>
        <a href="/notes/" class="btn btn-secondary">Cancel</a>
    </div>
</form>

{% endblock %}
