<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sticky Notes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        nav {
            background: #333;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        nav a { color: white; text-decoration: none; font-size: 15px; }
        nav a:hover { text-decoration: underline; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        .container { max-width: 960px; margin: 30px auto; padding: 0 20px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
        }
        .btn-primary   { background: #4CAF50; color: white; }
        .btn-danger    { background: #e53935; color: white; }
        .btn-secondary { background: #757575; color: white; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <nav>
        <a href="/notes/"><strong>📝 Sticky Notes</strong></a>
        {% if user.is_authenticated %}
            <a href="/notes/new/">+ New Note</a>
            <div class="nav-right">
                <span style="color:#aaa;">Hi, {{ user.username }}</span>
                <form method="post" action="/logout/" style="margin:0;">
                    {% csrf_token %}
                    <button type="submit" style="background:none;border:none;color:white;cursor:pointer;font-size:15px;">
                        Logout
                    </button>
                </form>
            </div>
        {% else %}
            <div class="nav-right">
                <a href="/login/">Login</a>
                <a href="/register/">Register</a>
            </div>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
